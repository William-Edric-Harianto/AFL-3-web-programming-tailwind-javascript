    <title>Portfolio</title>
    <link

      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --color-accent-500: #c9a227;
        --animate-shake: shake 1s ease-in-out;
        --animate-wiggle: wiggle 2s infinite;
      }
      @utility font-lato {
        font-family: "Lato", sans-serif;
      }
      @layer components {
        .navText {
          @apply no-underline text-white p-[15px_25px] md:p-[20px_30px] text-xl md:text-2xl my-[5px] block w-full text-left lg:p-[15px_10px] lg:my-[5px_0] lg:w-auto lg:inline-block
          hover:text-[22px] hover:font-bold hover:transform hover:rotate-[-5deg] hover:animate-shake;
        }
        .glassMorphic {
          @apply bg-white/10 backdrop-blur-lg border-b border-white/10;
        }
      }
      @keyframes shake {
        0%,
        100% {
          transform: translate(1px, 1px) rotate(0deg);
        }
        10% {
          transform: translate(-1px, -2px) rotate(-1deg);
        }
        20% {
          transform: translate(-3px, 0px) rotate(1deg);
        }
        30% {
          transform: translate(3px, 2px) rotate(0deg);
        }
        40% {
          transform: translate(1px, -1px) rotate(1deg);
        }
        50% {
          transform: translate(-1px, 2px) rotate(-1deg);
        }
        60% {
          transform: translate(-3px, 1px) rotate(0deg);
        }
        70% {
          transform: translate(3px, 1px) rotate(-1deg);
        }
        80% {
          transform: translate(-1px, -1px) rotate(1deg);
        }
        90% {
          transform: translate(1px, 2px) rotate(0deg);
        }
      }

      @keyframes wiggle {
        0%,
        80% {
          transform: rotate(0deg);
        }
        85% {
          transform: rotate(5deg);
        }
        95% {
          transform: rotate(-5deg);
        }
        100% {
          transform: rotate(0deg);
        }
      }
    </style>
    <script src="script.js"></script>
    <script src="preventZoom.js"></script>
  </head>
